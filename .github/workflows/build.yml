name: Build & Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          no-cache: true
          build-args: |
            CACHE_DATE=${{ github.event.head_commit.timestamp }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Verify migration count in published image
        if: github.event_name != 'pull_request'
        env:
          FORGEKEEPER_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
        run: |
          # Count migration .cs files in the repo (excluding Designer.cs and ModelSnapshot)
          REPO_COUNT=$(find src/Forgekeeper.Infrastructure/Data/Migrations -name '*.cs' \
            ! -name '*.Designer.cs' ! -name '*ModelSnapshot.cs' | wc -l | tr -d ' ')
          echo "Repo migration files: $REPO_COUNT"

          # Wait briefly for the image to be pullable, then extract and scan the DLL
          for attempt in 1 2 3; do
            if docker pull "$FORGEKEEPER_IMAGE" 2>/dev/null; then break; fi
            echo "GHCR not ready, retrying in 15s... ($attempt/3)"
            sleep 15
          done

          CID=$(docker create "$FORGEKEEPER_IMAGE")
          docker cp "${CID}:/app/Forgekeeper.Infrastructure.dll" /tmp/fk-infra.dll
          docker rm "$CID"

          DLL_COUNT=$(strings /tmp/fk-infra.dll | grep -cE '[0-9]{14}_[A-Z][A-Za-z]+' || true)
          echo "DLL migration attribute strings: $DLL_COUNT"

          if [ "$DLL_COUNT" -lt "$REPO_COUNT" ]; then
            echo "ERROR: DLL contains $DLL_COUNT migration(s) but repo has $REPO_COUNT .cs files."
            echo "Likely cause: one or more migrations are missing their .Designer.cs file"
            echo "(which carries the [Migration] attribute EF Core needs to discover them)."
            exit 1
          fi

          echo "OK: All $REPO_COUNT migrations are present in the published DLL."

      - name: E2E Tests (Playwright)
        if: github.event_name != 'pull_request'
        env:
          FORGEKEEPER_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
        run: |
          # Start Forgekeeper + Postgres via docker compose
          docker compose up -d postgres
          sleep 5
          
          # Pull the just-pushed image (retry for GHCR manifest propagation)
          echo "Pulling $FORGEKEEPER_IMAGE"
          for attempt in 1 2 3 4 5; do
            if docker pull $FORGEKEEPER_IMAGE 2>/dev/null; then
              echo "Image pulled successfully"
              break
            fi
            echo "GHCR not ready, retrying in 10s... ($attempt/5)"
            sleep 10
          done
          docker compose up -d forgekeeper
          
          # Wait for health check
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/health > /dev/null 2>&1; then
              echo "Forgekeeper is healthy"
              break
            fi
            echo "Waiting for Forgekeeper... ($i/30)"
            sleep 2
          done
          
          # Run E2E tests
          docker compose --profile test run --rm e2e
          
          # Cleanup
          docker compose --profile test down
