{{- if .Values.postgresql.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "forgekeeper.pgcluster" . }}
  labels:
    {{- include "forgekeeper.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.postgresql.instances }}
  bootstrap:
    initdb:
      database: forgekeeper
      owner: forgekeeper
  storage:
    size: {{ .Values.postgresql.storage.size }}
    {{- if .Values.postgresql.storage.storageClass }}
    storageClass: {{ .Values.postgresql.storage.storageClass }}
    {{- end }}
{{- end }}
