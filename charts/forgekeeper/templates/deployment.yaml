apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "forgekeeper.fullname" . }}
  labels:
    {{- include "forgekeeper.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "forgekeeper.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "forgekeeper.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dnsConfig }}
      dnsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          env:
            - name: TZ
              value: {{ .Values.config.timezone | quote }}
            - name: ASPNETCORE_URLS
              value: {{ .Values.config.aspnetcoreUrls | quote }}
            - name: FORGEKEEPER_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "forgekeeper.fullname" . }}-secret
                  key: encryption-key
            {{- if and .Values.config.security.apiKey (ne .Values.config.security.apiKey "") }}
            - name: Security__ApiKey
              valueFrom:
                secretKeyRef:
                  name: {{ include "forgekeeper.fullname" . }}-secret
                  key: api-key
            {{- end }}
            {{- if .Values.postgresql.enabled }}
            # CNPG — use alphabetical prefix trick for variable interpolation
            - name: A_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "forgekeeper.pgSecretName" . }}
                  key: host
            - name: A_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "forgekeeper.pgSecretName" . }}
                  key: dbname
            - name: A_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "forgekeeper.pgSecretName" . }}
                  key: password
            - name: A_DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "forgekeeper.pgSecretName" . }}
                  key: username
            - name: ConnectionStrings__ForgeDb
              value: "Host=$(A_DB_HOST);Database=$(A_DB_NAME);Username=$(A_DB_USER);Password=$(A_DB_PASS)"
            {{- else if .Values.postgresql.external.enabled }}
            - name: ConnectionStrings__ForgeDb
              valueFrom:
                secretKeyRef:
                  name: {{ include "forgekeeper.fullname" . }}-secret
                  key: connection-string
            {{- end }}
            # Storage paths
            - name: Storage__BasePaths__0
              value: {{ .Values.persistence.library.mountPath | quote }}
            - name: Storage__PluginPath
              value: {{ .Values.persistence.plugins.mountPath | quote }}
            - name: Forgekeeper__SourcesDirectory
              value: "{{ .Values.persistence.library.mountPath }}/sources"
            - name: Forgekeeper__PluginsDirectory
              value: {{ .Values.persistence.plugins.mountPath | quote }}
            - name: Thumbnails__OutputPath
              value: "{{ .Values.persistence.data.mountPath }}/thumbnails"
            # Thumbnail config
            - name: Thumbnails__Renderer
              value: {{ .Values.config.thumbnails.renderer | quote }}
            {{- if .Values.config.thumbnails.enabled }}
            - name: Thumbnails__Size
              value: {{ .Values.config.thumbnails.size | quote }}
            - name: Thumbnails__Format
              value: {{ .Values.config.thumbnails.format | quote }}
            {{- end }}
            # Search config
            - name: Search__MinTrigramSimilarity
              value: {{ .Values.config.search.minTrigramSimilarity | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.library.enabled }}
            - name: library
              mountPath: {{ .Values.persistence.library.mountPath }}
            {{- end }}
            {{- if .Values.persistence.data.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.data.mountPath }}
            {{- end }}
            {{- if and .Values.persistence.plugins.enabled (ne .Values.persistence.plugins.mountPath .Values.persistence.data.mountPath) }}
            - name: plugins
              mountPath: {{ .Values.persistence.plugins.mountPath }}
            {{- end }}
            - name: tmp
              mountPath: /tmp
      volumes:
        {{- if .Values.persistence.library.enabled }}
        - name: library
          {{- if .Values.persistence.library.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.library.existingClaim }}
          {{- else if .Values.persistence.library.nfs.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "forgekeeper.fullname" . }}-library
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "forgekeeper.fullname" . }}-library
          {{- end }}
        {{- end }}
        {{- if .Values.persistence.data.enabled }}
        - name: data
          {{- if .Values.persistence.data.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.data.existingClaim }}
          {{- else if .Values.persistence.data.nfs.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "forgekeeper.fullname" . }}-data
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "forgekeeper.fullname" . }}-data
          {{- end }}
        {{- end }}
        {{- if and .Values.persistence.plugins.enabled (ne .Values.persistence.plugins.mountPath .Values.persistence.data.mountPath) }}
        - name: plugins
          {{- if .Values.persistence.plugins.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.plugins.existingClaim }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "forgekeeper.fullname" . }}-plugins
          {{- end }}
        {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
