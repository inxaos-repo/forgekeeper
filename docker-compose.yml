services:
  forgekeeper:
    build: .
    ports:
      - "5000:5000"
    environment:
      - ConnectionStrings__ForgeDb=Host=postgres;Port=5432;Database=forgekeeper;Username=forgekeeper;Password=forgekeeper
      - Storage__BasePaths__0=/mnt/3dprinting
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
    volumes:
      # Mount your 3D printing collection here
      - ./sample-data:/mnt/3dprinting
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: forgekeeper
      POSTGRES_USER: forgekeeper
      POSTGRES_PASSWORD: forgekeeper
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgekeeper"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
