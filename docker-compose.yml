services:
  forgekeeper:
    image: ghcr.io/inxaos-repo/forgekeeper:main
    # Or build locally: build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - ConnectionStrings__ForgeDb=Host=postgres;Port=5432;Database=forgekeeper;Username=forgekeeper;Password=forgekeeper
      - Storage__BasePaths__0=/library
      - FORGEKEEPER_ENCRYPTION_KEY=change-me-to-something-random
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - Thumbnails__Size=256
      - Search__MinTrigramSimilarity=0.3
    volumes:
      # Mount your 3D printing collection
      - ${LIBRARY_PATH:-./sample-library}:/library
      # Plugin directory for custom scrapers
      - ./plugins:/app/plugins
      # Persistent data (thumbnails, cache)
      - forgekeeper-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: forgekeeper
      POSTGRES_USER: forgekeeper
      POSTGRES_PASSWORD: forgekeeper
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgekeeper"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FlareSolverr — Cloudflare bypass for MyMiniFactory plugin
  # Required for the MMF scraper to log in and fetch your library
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - TZ=America/Los_Angeles
    ports:
      - "8191:8191"

  # E2E tests — run with: docker compose run e2e
  e2e:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    working_dir: /work
    volumes:
      - ./tests/Forgekeeper.E2E:/work
    environment:
      - FORGEKEEPER_URL=http://forgekeeper:5000
    command: bash -c "npm ci && npx playwright test --reporter=list"
    depends_on:
      forgekeeper:
        condition: service_healthy
    profiles:
      - test

volumes:
  pgdata:
  forgekeeper-data:
