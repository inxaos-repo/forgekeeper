apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgekeeper
  namespace: forgekeeper
  labels:
    app.kubernetes.io/name: forgekeeper
    app.kubernetes.io/component: api
spec:
  replicas: 1
  strategy:
    type: Recreate  # Single instance due to background workers + file locks
  selector:
    matchLabels:
      app.kubernetes.io/name: forgekeeper
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgekeeper
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: forgekeeper
          image: ghcr.io/your-org/forgekeeper:latest
          ports:
            - containerPort: 5000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: forgekeeper-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          volumeMounts:
            # NFS mount to 3D printing collection
            - name: models
              mountPath: /mnt/3dprinting
            # Plugin directory
            - name: plugins
              mountPath: /app/plugins
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
      volumes:
        # NFS volume for 3D printing files
        - name: models
          nfs:
            server: 192.168.2.10   # Your NFS server IP
            path: /warehousepool/3dprinting
        # Plugin volume — can be PVC, NFS, or hostPath
        - name: plugins
          persistentVolumeClaim:
            claimName: forgekeeper-plugins
